<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anime Shelf</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand-block">
        <p class="eyebrow">Local anime library</p>
        <h1>Anime Shelf</h1>
        <p class="brand-copy">像一个真正的动漫站一样整理封面、作品和剧集，同时继续保留本地导入播放。</p>
      </div>
      <div class="topbar-actions">
        <label class="icon-button" title="&#23548;&#20837;&#35270;&#39057;">
          <span aria-hidden="true">+</span>
          <input id="videoInput" type="file" accept="video/*" multiple>
        </label>
        <label class="icon-button" title="&#23548;&#20837;&#23553;&#38754;">
          <span aria-hidden="true">C</span>
          <input id="coverInput" type="file" accept="image/*">
        </label>
      </div>
    </header>

    <main class="page-shell">
      <section class="catalog-panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Catalog</p>
            <h2>&#30058;&#21095;&#23553;&#38754;&#22681;</h2>
          </div>
          <span id="seriesCount" class="count">0</span>
        </div>

        <div class="filters">
          <input id="searchInput" type="search" placeholder="&#25628;&#32034;&#20316;&#21697;&#25110;&#21095;&#38598;">
          <div class="segmented" role="group" aria-label="&#31579;&#36873;&#29366;&#24577;">
            <button class="active" type="button" data-filter="all">&#20840;&#37096;</button>
            <button type="button" data-filter="watching">&#36861;&#30058;</button>
            <button type="button" data-filter="done">&#30475;&#23436;</button>
            <button type="button" data-filter="planned">&#24819;&#30475;</button>
          </div>
        </div>

        <div id="seriesGrid" class="series-grid"></div>
      </section>

      <section class="detail-panel">
        <div class="hero-card">
          <div class="hero-cover">
            <img id="heroCover" alt="">
          </div>
          <div class="hero-content">
            <p class="eyebrow">Series</p>
            <h2 id="seriesTitle">&#36824;&#27809;&#26377;&#36873;&#25321;&#20316;&#21697;</h2>
            <p id="seriesMeta" class="hero-meta">&#20808;&#36873;&#19968;&#37096;&#30058;&#21095;&#65292;&#28982;&#21518;&#22312;&#21491;&#20391;&#30475;&#21095;&#38598;&#21015;&#34920;&#12290;</p>
            <div class="hero-stats">
              <span id="episodeCountBadge" class="stat-pill">0 &#38598;</span>
              <span id="statusBadge" class="stat-pill muted">&#26410;&#35774;&#32622;</span>
            </div>
            <div class="series-tools">
              <input id="titleEdit" type="text" placeholder="&#20462;&#25913;&#20316;&#21697;&#21517;" disabled>
              <select id="statusSelect" disabled>
                <option value="watching">&#36861;&#30058;&#20013;</option>
                <option value="done">&#24050;&#30475;&#23436;</option>
                <option value="planned">&#24819;&#30475;</option>
              </select>
              <button id="saveMeta" type="button" disabled>&#20445;&#23384;</button>
              <button id="removeCurrent" class="ghost-button" type="button" disabled>&#31227;&#38500;</button>
            </div>
          </div>
        </div>

        <div class="player-card">
          <div class="player-shell">
            <video id="player" controls playsinline></video>
            <div id="emptyPlayer" class="empty-player">
              <strong>&#25226;&#21160;&#28459;&#25991;&#20214;&#25302;&#36827;&#26469;&#65292;&#25110;&#32773;&#28857;&#21491;&#19978;&#35282; + &#23548;&#20837;&#12290;</strong>
              <span>&#25903;&#25345;&#27983;&#35272;&#22120;&#33021;&#25773;&#25918;&#30340; MP4&#12289;WebM&#12289;MKV &#31561;&#26684;&#24335;&#65307;&#25152;&#26377;&#20869;&#23481;&#21482;&#22312;&#26412;&#26426;&#20351;&#29992;&#12290;</span>
            </div>
          </div>
          <div class="now-playing">
            <div>
              <p class="eyebrow">Now watching</p>
              <h3 id="currentEpisodeTitle">&#36824;&#27809;&#26377;&#36873;&#25321;&#21095;&#38598;</h3>
            </div>
            <span id="currentEpisodeMeta" class="muted-copy">&#35831;&#20808;&#20174;&#23553;&#38754;&#22681;&#36873;&#19968;&#37096;&#20316;&#21697;&#12290;</span>
          </div>
        </div>

        <div class="episodes-card">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">Episodes</p>
              <h2>&#21095;&#38598;&#21015;&#34920;</h2>
            </div>
          </div>
          <div id="dropZone" class="drop-zone">
            <span>&#25302;&#25341;&#35270;&#39057;&#21040;&#36825;&#37324;&#23548;&#20837;&#21040;&#24403;&#21069;&#29255;&#21333;</span>
          </div>
          <div id="episodeList" class="episode-list"></div>
        </div>
      </section>
    </main>

    <template id="seriesTemplate">
      <article class="series-card">
        <button class="series-poster" type="button" aria-label="&#25171;&#24320;&#20316;&#21697;">
          <img alt="">
          <span class="series-status"></span>
        </button>
        <div class="series-info">
          <h3></h3>
          <p class="series-copy"></p>
          <p class="series-foot"></p>
        </div>
      </article>
    </template>

    <template id="episodeTemplate">
      <article class="episode-card">
        <button class="episode-play" type="button" aria-label="&#25773;&#25918;">
          <span class="play-mark">&gt;</span>
        </button>
        <div class="episode-info">
          <h3></h3>
          <p></p>
          <div class="progress-bar"><span></span></div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
